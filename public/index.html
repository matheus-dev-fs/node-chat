<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chat</title>
    <link rel="stylesheet" href="/styles.css">
</head>

<body>
    <div id="login-page" class="h-screen bg-gray-100 flex items-center justify-center flex-col gap-4">
        <h1 class="text-xl">Qual seu nome?</h1>
        <input type="text" id="login-name-input"
            class="border border-black bg-gray-200 text-lg p-3 rounded-md outline-none w-full max-w-sm">
    </div>

    <div id="chat-page" class="h-screen bg-gray-100 hidden items-center justify-center flex-col">
        <div class="flex-1 w-full flex">
            <ul id="chat-list" class="flex-1 px-1 bg-white overflow-y-scroll max-h-[calc(100vh-40px)]"></ul>

            <ul id="users-list" class="w-48 bg-gray-200 overflow-y-scroll max-h-[calc(100vh-40px)]"></ul>
        </div>

        <div class="w-full flex">
            <input type="text" id="chat-text-input" placeholder="Digite uma mensagem (Enter para enviar)"
                class="flex-1 h-10 placeholder-gray-800 px-3 text-sm bg-gray-100 outline-none border-none" />
        </div>
    </div>

    <script type="module" src="/main.js"></script>
</body>

</html>
